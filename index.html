<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Hygiene Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    Smart Hygiene Management System
</header>

<div class="container">
    <div class="card">
        <h2>Odor Level</h2>
        <p id="odor">Normal</p>
    </div>

    <div class="card">
        <h2>Water Level</h2>
        <p id="water">Full</p>
    </div>

    <div class="card">
        <h2>Dustbin Status</h2>
        <p id="dustbin">70% Filled</p>
    </div>

    <div class="card">
        <h2>Cleanliness Score</h2>
        <p id="cleanliness">85%</p>
        <button onclick="checkStatus()">Check Status</button>
    </div>
</div>

<footer>
    © 2026 | Developed by Dikshit
</footer>

<script src="script.js"></script>
</body>
</html>
